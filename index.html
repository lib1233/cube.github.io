<title>Успіх у кубі: працювати, вчитись, досягати</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    overflow:hidden;
    height:100vh;
    background-image:url('Background.jpg');
    background-size:cover;
    font-family:Arial, Helvetica, sans-serif;
    color:#dff7ff;
}



.scene{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:2200px;
    position:relative;
}

.row{
    display:flex;
    gap:70px;
    transform-style:preserve-3d;
}



.cube-wrap{
    width:170px;
    height:170px;
    position:relative;
    cursor:pointer;
    transform-style:preserve-3d;
    transition:
        transform 1.2s cubic-bezier(.2,.8,.2,1),
        filter .8s;
}

.cube-wrap:hover{
    filter:drop-shadow(0 0 18px rgba(90,220,255,.9));
}

.cube{
    width:100%;
    height:100%;
    position:absolute;
    transform-style:preserve-3d;
    animation:rotateCube 18s linear infinite;
}



.cube-wrap.active{
    position:absolute;

    transform:
        translateX(120px)
        translateY(-32px)
        translateZ(1100px)
        scale(1.25);

    z-index:1000;

    filter:
        drop-shadow(0 0 35px rgba(0,255,255,.95))
        drop-shadow(0 0 90px rgba(0,180,255,.45));

    transition:
        transform 1.35s cubic-bezier(.2,.8,.2,1),
        filter .8s;
}



.face{
    position:absolute;
    width:170px;
    height:170px;

    background:rgba(255,255,255,0.015);

    border:1px solid rgba(120,240,255,.22);

    backdrop-filter:none;

    box-shadow:
        inset 0 0 8px rgba(255,255,255,.04),
        0 0 18px rgba(0,220,255,.12);

    overflow:hidden;
}

.face::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.18) 0%,
            rgba(255,255,255,0) 22%,
            rgba(255,255,255,0) 78%,
            rgba(255,255,255,.08) 100%
        );

    pointer-events:none;
}



.front  { transform:translateZ(85px); }
.back   { transform:rotateY(180deg) translateZ(85px); }
.right  { transform:rotateY(90deg) translateZ(85px); }
.left   { transform:rotateY(-90deg) translateZ(85px); }
.top    { transform:rotateX(90deg) translateZ(85px); }
.bottom { transform:rotateX(-90deg) translateZ(85px); }


.book{
    position:absolute;
    width:100px;
    height:140px;
    left:48px;
    top:30px;

    transform-style:preserve-3d;
    animation:bookFloat 5s ease-in-out infinite;
}

.book-back,
.book-cover,
.book-side,
.pages{
    position:absolute;
    background-size:cover;
    background-position:center;
}

.book-cover,
.book-back{
    width:98px;
    height:140px;
    overflow:hidden;
    backface-visibility:hidden;
}

.book-cover{
    transform:translateZ(8px);

    box-shadow:
        0 0 20px rgba(0,255,255,.55);
}

.book-back{
    transform:
        rotateY(180deg)
        translateZ(8px);
}

.book-side{
    width:16px;
    height:140px;

    transform:
        rotateY(90deg)
        translateZ(-8px);
}

.pages{
    position:absolute;

    width:16px;
    height:140px;

    left:80px;

    background:
        repeating-linear-gradient(
            to right,
            #ffffff 0px,
            #e9e9e9 2px,
            #ffffff 4px
        );

    transform:
        rotateY(90deg)
        translateZ(10px);

    box-shadow:
        inset 0 0 3px rgba(0,0,0,.15),
        0 0 4px rgba(255,255,255,.35);
}

.book-top{
    position:absolute;

    width:15px;
    height:97px;

    left:56px;

    background:
        repeating-linear-gradient(
            to right,
            #ffffff 0px,
            #e9e9e9 2px,
            #ffffff 4px
        );

    transform:
        rotateX(90deg)
        rotateZ(90deg)
        translateX(0px)
        translateZ(48px)
        translateY(14px);

    box-shadow:
        inset 0 0 3px rgba(0,0,0,.15),
        0 0 4px rgba(255,255,255,.35);
}


.book1 .book-cover{
       background-image:url('Realization-1.jpg');
}
.book1 .book-back{
    background-image:url('Realization-2.jpg');
}
.book1 .book-side
{background-image:url('Realization-3.jpg');
}

.book2 .book-cover{
    background-image:url('Social-1.jpg');
}

.book2 .book-back{
    background-image:url('Social-2.jpg');
}
.book2 .book-side
{background-image:url('Social-3.jpg');
}

.book3 .book-cover{
       background-image:url('Agro-1.jpg');
}
.book3 .book-back{
    background-image:url('Agro-2.jpg');
}
.book3 .book-side
{background-image:url('Agro-2.jpg');
}

.book4 .book-cover{
    background-image:url('Psychological-1.jpg');
}
.book4 .book-back{
    background-image:url('Psychological-2.jpg');
}
.book4 .book-side{
background-image:url('Psychological-3.jpg');
}

.book5 .book-cover{
    background-image:url('Competence-1.jpg');
}

.book5 .book-back{
    background-image:url('Competence-2.jpg');
}
.book5 .book-side
{background-image:url('Competence-2.jpg');
}



.book-cover::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            transparent,
            rgba(255,255,255,.4),
            transparent
        );

    animation:scan 4s linear infinite;
}



.title{
    position:relative;
    margin-top:40px;
    font-size:25px;
    font-style:italic;
    text-align:center;
    color:#d7f6ff;
    text-shadow:0 0 15px cyan;
    letter-spacing:2px;
}

.title-2{
    position:relative;
    margin-top:40px;
    font-size:54px;
    text-align:center;
    color:#6ef7ff;
    text-shadow:0 0 15px cyan;
    letter-spacing:2px;
}

.title-3{
    position:absolute;
    top:650px;
    right:160px;
    font-size:25px;
    color:#d7f6ff;
    text-shadow:0 0 15px cyan;
}


.info-panel{
    position:fixed;
    overflow:auto;

    right:-800px;
    top:50%;

    transform:translateY(-50%);

    width:700px;
    height:620px;

    padding:35px;

    background:
        linear-gradient(
            145deg,
            rgba(10,25,50,.94),
            rgba(5,10,20,.96)
        );

    border:1px solid rgba(0,255,255,.35);

    box-shadow:
        0 0 40px rgba(0,255,255,.22),
        inset 0 0 20px rgba(0,255,255,.08);

    backdrop-filter:blur(10px);

    transition:right .8s cubic-bezier(.2,.9,.2,1);

    z-index:999;
}

.info-panel.show{
    right:10px;
}

.info-panel::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        repeating-linear-gradient(
            to bottom,
            rgba(0,255,255,.05),
            rgba(0,255,255,.05) 1px,
            transparent 1px,
            transparent 4px
        );

    pointer-events:none;
}

.info-title{
    font-size:18.5px;
    margin-bottom:25px;
    color:#6ef7ff;
    text-shadow:0 0 15px cyan;
    text-align:justify;
    text-indent:17px;
    letter-spacing:2px;
    margin:1em;
}

.info-text{
    line-height:1.8;
    font-size:16px;
    color:#d7f6ff;
    text-align:justify;
    text-indent:17px;
    margin:1em;
}


.read-link{
    margin-top:40px;
    display:none;

    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:14px;

    text-decoration:none;
    width:100%;
}

.read-link.show{
    display:flex;
}

.neon-circle{
    width:64px;
    height:64px;

    border-radius:50%;
    border:2px solid #00f7ff;

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
        0 0 14px #00f7ff,
        inset 0 0 10px rgba(0,247,255,.5);

    transition:.35s;
}

.neon-circle:hover{
    transform:scale(1.08);

    box-shadow:
        0 0 25px #00f7ff,
        inset 0 0 18px rgba(0,247,255,.8);
}

.neon-circle svg{
    width:28px;
    fill:#7fffff;
    filter:drop-shadow(0 0 6px #00ffff);
}

.read-text{
    color:#7efcff;
    font-size:22px;
    letter-spacing:2px;
    text-shadow:0 0 10px #00f7ff;
}



.hud{
    position:absolute;
    inset:0;
    pointer-events:none;
}

.hud::before,
.hud::after{
    content:"";
    position:absolute;
    border:1px solid rgba(0,255,255,.08);
}

.hud::before{
    inset:40px;
}

.hud::after{
    inset:80px;
}


::-webkit-scrollbar{
    width:12px;
}

::-webkit-scrollbar-thumb{
    background-color:#00ffff;
    border-radius:10px;
    border:2px solid #000000;
}



@keyframes rotateCube{
    from{
        transform:rotateX(-18deg) rotateY(0deg);
    }

    to{
        transform:rotateX(-18deg) rotateY(360deg);
    }
}

@keyframes bookFloat{
    0%,100%{
        transform:translateY(0px) rotateY(0deg);
    }

    50%{
        transform:translateY(-8px) rotateY(10deg);
    }
}

@keyframes scan{
    0%{
        transform:translateY(-120%);
    }

    100%{
        transform:translateY(120%);
    }
}



@media (max-width:1400px){

    .row{
        gap:40px;
        transform:scale(.85);
    }

    .panel{
        width:320px;
    }
}
</style>

data-text="У збірнику представлено тези доповідей учасників ІІІ Всеукраїнської студентської науково-практичної конференції «Соціально-освітні домінанти професійної підготовки сучасного компетентного фахівця». У ході проведення  конференції було обговорено низку актуальних питань, пов’язаних з теоретичними і практичними засадами підготовки сучасного компетентного фахівця: вітчизняний і зарубіжний досвід, особливостями підготовки конкурентоспроможного випускника ЗВО в період війни; технологіями розвитку професійної майстерності психолога у період війни і повоєнного відновлення України; розвитком компетентності молодих фахівців щодо прийняття ефективних управлінських рішень; роллю педагога вищої школи у формуванні національної свідомості особистості в умовах воєнного стану; індивідуальної освітньої траєкторії майбутнього фахівця; підготовкою майбутніх психологів до надання ефективної психологічної допомоги в період війни, тощо.

data-text="У збірнику представлено тези доповідей учасників регіонального науково-практичного семінару «Психолого-педагогічні чинники формування професійної компетентності кваліфікованих робітників в умовах воєнного стану» (26 квітня 2024 р. року, м. Біла Церква). У ході роботи семінару було розглянуто ряд актуальних питань стосовно: психологічного супроводу формування соціально успішної особистості майбутнього кваліфікованого робітника в умовах воєнного стану; педагогічних чинників розвитку фахових компетентностей кваліфікованих робітників в умовах воєнного стану; особливостей організації та проведення виховної роботи в закладах професійної (професійно-технічної) освіти; психологічної підтримки учасників освітнього процесу в умовах воєнного стану; підвищення мотивації здобувачів професійної (професійно-технічної) освіти до навчання в умовах воєнного стану; створення інноваційного освітнього середовища в закладах професійної (професійно-технічної) освіти. 
<p>Матеріали збірника стануть у пригоді керівникам, методистам, старшим майстрам, викладачам професійно-теоретичної підготовки та майстрам виробничого навчання закладів професійної (професійно-технічної) освіти. За зміст і достовірність матеріалів несуть відповідальність автори тез. </p>

data-text="Збірник укладено на основі матеріалів і тез учасників Регіонального науково-практичного семінару «Розвиток науково-методичної компетентності педагогічних працівників ЗП(ПТ)О в умовах воєнного стану та пандемії», що відбувся 26 травня 2022 року. Співорганізаторами заходу виступили: кафедра методики професійної освіти та соціально-гуманітарних дисциплін Білоцерківського інституту неперервної професійної освіти ДЗВО «УМО» НАПН України та Навчально-методичний центр професійно-технічної освіти у Черкаській області.
<p>Актуалізовано професійну значимість розвитку науково-методичної компетентності педагогів професійної (професійно-технічної) освіти в умовах воєнного стану та пандемії. Узагальнено наукові доповіді, презентований інноваційний педагогічний досвід і кращі освітні практики. Враховувати ключові тенденції розвитку світового та вітчизняного ринків освіти, використання здобутків й досвіду інституцій системи безперервної освіти як майданчиків для інновацій; розглянуто сучасну навчально-організаційна та науково-методична діяльність педагога ЗП(ПТ)О та шляхи її удосконалення; узагальнено практику реалізації новітніх науково-методичних підходів до організації та проведення сучасного заняття з професійної підготовки; конкретизовано шляхи розвитку науково-методичної компетентності педагогів ЗП(ПТ)О в контексті удосконалення формальної, неформальної та інформальної освіти, важливим вбачається практика формування та розвиток науково-методичної компетентності педагогів ЗП(ПТ)О в системі безперервної освіти в умовах воєнного стану та пандемії.</p>

<script>
const cubes = document.querySelectorAll('.cube-wrap');

const panel = document.getElementById('panel');
const title = document.getElementById('title');
const text = document.getElementById('text');

const readLink = document.getElementById('readLink');

let activeCube = null;

cubes.forEach(cube => {

    cube.addEventListener('click', () => {

   

        if(activeCube === cube){

            cube.classList.remove('active');
            panel.classList.remove('show');
            readLink.classList.remove('show');

            activeCube = null;
            return;
        }



        cubes.forEach(c => c.classList.remove('active'));



        cube.classList.add('active');

        title.innerHTML = cube.dataset.title;
        text.innerHTML = cube.dataset.text;

        panel.classList.add('show');


        const link = cube.dataset.link;

        if(link){

            readLink.href = link;
            readLink.classList.add('show');

        } else {

            readLink.classList.remove('show');
            readLink.removeAttribute('href');
        }

        activeCube = cube;
    });

});
</script>
